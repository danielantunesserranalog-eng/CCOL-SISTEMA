<style>
    .modern-turno-table th { 
        background: rgba(0,0,0,0.4); 
        color: var(--ccol-blue-bright); 
        font-weight: 600; 
        padding: 15px 12px; 
        font-size: 0.9rem;
        border-bottom: 2px solid var(--ccol-blue-bright);
    }
    .modern-turno-table td { 
        padding: 12px; 
        vertical-align: middle; 
        border-bottom: 1px solid rgba(255,255,255,0.05); 
    }
    .modern-turno-table tr:hover td { 
        background: rgba(255,255,255,0.03); 
    }
    .badge-go { 
        background: rgba(168, 85, 247, 0.15); 
        color: #d8b4fe; 
        padding: 5px 10px; 
        border-radius: 6px; 
        font-size: 0.85rem; 
        font-weight: bold; 
        border: 1px solid rgba(168, 85, 247, 0.4); 
        display: inline-block;
    }
    .badge-turno {
        background: rgba(52, 152, 219, 0.1);
        color: #3498db;
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: bold;
        border: 1px solid rgba(52, 152, 219, 0.3);
        display: inline-block;
        white-space: nowrap;
    }
    .hora-estimada { 
        font-size: 1.15rem; 
        font-weight: 800; 
        color: #4ade80; 
        text-shadow: 0 0 8px rgba(74, 222, 128, 0.4); 
        background: rgba(74, 222, 128, 0.1); 
        padding: 6px 12px; 
        border-radius: 8px; 
        display: inline-block;
        border: 1px solid rgba(74, 222, 128, 0.3);
    }
    .input-moderno { 
        background: rgba(0,0,0,0.3) !important; 
        border: 1px solid rgba(255,255,255,0.15) !important; 
        border-radius: 8px !important; 
        color: #fff !important; 
        padding: 10px !important; 
        transition: all 0.3s ease; 
        width: 100%;
    }
    .input-moderno:focus { 
        border-color: var(--ccol-blue-bright) !important; 
        box-shadow: 0 0 10px rgba(52, 152, 219, 0.3); 
        outline: none;
    }
    
    /* CORREÇÃO DAS OPÇÕES DO SELECT (MENU SUSPENSO) */
    .input-moderno option {
        background-color: #1e293b !important; /* Fundo escuro sólido */
        color: #ffffff !important; /* Letra branca */
        padding: 10px;
    }
    .input-moderno optgroup {
        background-color: #0f172a !important; /* Fundo mais escuro para o título do grupo */
        color: #7dd3fc !important; /* Azul claro para o título */
        font-weight: bold;
        font-style: normal;
    }

    .leaflet-container { background: #1e293b; font-family: 'Inter', sans-serif; }
</style>

<div class="content-panel" style="animation: fadeIn 0.3s ease; min-height: 80vh; background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);">
    <div style="display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid var(--border-dim); padding-bottom: 15px;">
        <button class="btn-primary-blue" id="btnAbaRegistros" onclick="alternarAbaTroca('registros')">📋 Troca de Turno (Escala)</button>
        <button class="btn-secondary-dark" id="btnAbaLocais" onclick="alternarAbaTroca('locais')">📍 Cadastro de Locais & Mapa</button>
    </div>

    <div id="aba-registros">
        <h3 style="color: #f1c40f; margin-bottom: 20px; font-weight: 800; font-size: 1.5rem;">🔄 Painel Dinâmico de Troca</h3>
        
        <div class="form-group-dark" style="max-width: 250px; margin-bottom: 20px;">
            <label style="color: #94a3b8; font-weight: 600;">Data da Troca</label>
            <input type="date" id="dataFiltroTroca" class="input-moderno" onchange="carregarTrocasDoDia()">
        </div>

        <div class="table-responsive" style="background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden;">
            <table class="dark-table modern-turno-table" style="margin: 0; width: 100%;">
                <thead>
                    <tr>
                        <th style="width: 12%;">Conjunto / GO</th>
                        <th style="width: 12%;">Placa (Cavalo)</th>
                        <th style="width: 10%; text-align: center;">Previsto</th>
                        <th style="width: 20%;">Motorista (Escala)</th>
                        <th style="width: 15%;">Local da Troca</th>
                        <th style="width: 10%;">Horário Real</th>
                        <th style="width: 11%; text-align: center;">Troca (+12h)</th>
                        <th style="width: 10%; text-align: center;">Ação</th>
                    </tr>
                </thead>
                <tbody id="tbodyTrocaTurno">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="aba-locais" style="display: none;">
        <h3 style="color: #f1c40f; margin-bottom: 20px;">📍 Cadastrar Localização de Troca</h3>
        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 350px;">
                <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                    <p style="font-size: 0.9rem; color: #7dd3fc; margin-bottom: 10px; font-weight: bold;">🛰️ 1. Clique no mapa para marcar o local:</p>
                    <div id="mapTroca" style="height: 350px; width: 100%; border-radius: 8px; margin-bottom: 20px; border: 2px solid var(--border-dim); cursor: crosshair;"></div>
                    <div style="display: flex; gap: 10px; align-items: flex-end;">
                        <div style="flex: 1; margin: 0;">
                            <label>Nome do Local</label>
                            <input type="text" id="novoLocalTroca" class="input-moderno" placeholder="Ex: Base Itabatã...">
                        </div>
                        <input type="hidden" id="latLocal">
                        <input type="hidden" id="lngLocal">
                        <button class="btn-primary-green" onclick="salvarNovoLocalTroca()" style="height: 42px;">💾 Salvar</button>
                    </div>
                </div>
            </div>
            <div style="flex: 1; min-width: 350px;">
                <div class="table-responsive" style="background: rgba(0,0,0,0.2); border-radius: 12px; height: 100%;">
                    <table class="dark-table modern-turno-table" style="width: 100%;">
                        <thead>
                            <tr>
                                <th>Nome do Local</th>
                                <th>Mapa</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyLocaisTroca"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
