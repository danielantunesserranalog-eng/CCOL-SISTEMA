<div class="action-bar">
    <div class="filter-group">
        <label for="dataInicioEscala">Início da Escala:</label>
        <input type="date" id="dataInicioEscala" class="dark-select" onchange="window.renderizarEscala()">
        
        <label for="filtroConjuntoEscala" style="margin-left: 10px;">Conjunto:</label>
        <select id="filtroConjuntoEscala" class="dark-select" onchange="window.renderizarEscala()">
            <option value="todos">Todos</option>
        </select>
        <button id="refreshEscalaBtn" class="btn-icon-only" title="Atualizar" onclick="window.renderizarEscala()">🔄</button>
    </div>
    <div class="button-group">
        <button id="btnGerarRelatorio" class="btn-primary-blue" onclick="window.imprimirRelatorioEscalaSemanal()">🖨️ Imprimir Relatório</button>
        <button id="btnExportarExcel" class="btn-primary-green" style="background-color: #10b981;" onclick="window.exportarEscalaMensalExcel()">📊 Exportar Mês (Excel)</button>
        <button id="btnGerarEscalaAuto" class="btn-primary-green" onclick="window.gerarEscala4x2()">⚡ Gerar 4x2 Automática</button>
        <button id="btnZerarEscala" class="btn-danger-outline" onclick="window.zerarEscala()">🗑️ Zerar</button>
    </div>
</div>

<div id="escalaContainer" class="escala-viz-container">
    <p class="loading-text" style="padding: 20px; text-align: center; color: #fff;">Iniciando terminal CCOL...</p>
</div>

<div class="system-note">
    <span class="note-icon">💡</span>
    <p>O sistema CCOL gera automaticamente escalas 4x2 baseadas na Equipe (A-F). Para melhor visualização, dias de Trabalho estão em <span class="viz-sample trabalho">Azul</span> e Folgas em <span class="viz-sample folga">Laranja</span>. Treinamentos agendados ficarão na cor <span style="background: #fde047; color: #000; padding: 2px 5px; border-radius: 3px; font-weight: bold;">Amarela</span>.</p>
</div>
