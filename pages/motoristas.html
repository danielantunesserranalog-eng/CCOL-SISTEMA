<div class="content-panel form-panel-dark">
    <div class="panel-header"><h3>➕ Cadastrar Novo Motorista</h3></div>
    <div class="form-grid">
        <div class="form-group-dark">
            <label>Nome Completo</label>
            <input type="text" id="motoristaNome" placeholder="Ex: João Silva">
        </div>
        <div class="form-group-dark">
            <label>Alocar em Conjunto</label>
            <select id="motoristaConjunto" class="dark-select">
                <option value="">Não Alocar (Disponível / Reserva)</option>
            </select>
        </div>
        <div class="form-group-dark">
            <label>Equipe (Dia / Noite / Folga)</label>
            <select id="motoristaEquipe" class="dark-select">
                <option value="-">Sem Equipe</option>
                <option value="A">A (Fixo Dia - Frota 1)</option>
                <option value="B">B (Fixo Dia - Frota 2)</option>
                <option value="C">C (⭐ FOLGUISTA DIA)</option>
                <option value="D">D (Fixo Noite - Frota 1)</option>
                <option value="E">E (Fixo Noite - Frota 2)</option>
                <option value="F">F (⭐ FOLGUISTA NOITE)</option>
            </select>
        </div>
        <div class="form-group-dark">
            <label>Turno Padrão</label>
            <select id="motoristaTurno" class="dark-select">
                <option value="-">Não Definido</option>
                <option value="06:00-18:00">06:00-18:00 (Dia)</option>
                <option value="18:00-06:00">18:00-06:00 (Noite)</option>
                <option value="Misto">Misto (Folguista)</option>
            </select>
        </div>
        <div class="form-group-dark">
            <label>Data Inicial (Início do Ciclo)</label>
            <input type="date" id="motoristaDataAncora" class="dark-select" title="Quando começa o primeiro dia de trabalho (gera a escala automático)">
        </div>
        <div class="form-group-dark">
            <label>Curso Master Drive?</label>
            <select id="motoristaMasterDrive" class="dark-select">
                <option value="Sim">Sim</option>
                <option value="Não">Não</option>
            </select>
        </div>
        <div class="form-group-dark">
            <label>Curso Destra?</label>
            <select id="motoristaDestra" class="dark-select">
                <option value="Sim">Sim</option>
                <option value="Não">Não</option>
            </select>
        </div>
        <div class="form-group-dark">
            <label>Cidade que Mora</label>
            <select id="motoristaCidade" class="dark-select">
                <option value="">Selecione a cidade...</option>
                <option value="Itabatã - BA">Itabatã - BA</option>
                <option value="Posto da Mata - BA">Posto da Mata - BA</option>
                <option value="Mucuri - BA">Mucuri - BA</option>
                <option value="Nova Viçosa - BA">Nova Viçosa - BA</option>
                <option value="Teixeira de Freitas - BA">Teixeira de Freitas - BA</option>
                <option value="Caravelas - BA">Caravelas - BA</option>
                <option value="Alcobaça - BA">Alcobaça - BA</option>
                <option value="Prado - BA">Prado - BA</option>
                <option value="Ibirapuã - BA">Ibirapuã - BA</option>
                <option value="Medeiros Neto - BA">Medeiros Neto - BA</option>
                <option value="Pedro Canário - ES">Pedro Canário - ES</option>
                <option value="Conceição da Barra - ES">Conceição da Barra - ES</option>
                <option value="Braço do Rio - ES">Braço do Rio - ES</option>
                <option value="Pinheiros - ES">Pinheiros - ES</option>
                <option value="Montanha - ES">Montanha - ES</option>
                <option value="Nanuque - MG">Nanuque - MG</option>
                <option value="Carlos Chagas - MG">Carlos Chagas - MG</option>
                <option value="Serra dos Aimorés - MG">Serra dos Aimorés - MG</option>
                <option value="Outra Cidade">Outra Cidade</option>
            </select>
        </div>
        <div class="form-actions" style="grid-column: 1 / -1;">
            <button id="btnAddMotorista" class="btn-primary-green btn-full" onclick="adicionarMotorista()">✅ Salvar e Alocar Motorista</button>
        </div>
    </div>
</div>

<div class="content-panel">
    <div class="panel-header">
        <h3>📋 Lista de Motoristas</h3>
        <div class="panel-controls">
            <input type="text" id="searchMotorista" placeholder="Buscar motorista CCOL..." class="search-input-dark">
        </div>
    </div>
    <div class="table-modern-wrapper">
        <table class="data-table-modern">
            <thead>
                <tr>
                    <th>Nome / Status</th>
                    <th>Master</th>
                    <th>Destra</th>
                    <th>Cidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="motoristasList"></tbody>
        </table>
    </div>
</div>
