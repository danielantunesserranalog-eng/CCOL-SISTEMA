<div class="content-panel form-panel-dark">
    <div class="panel-header"><h3>➕ Criar Novo Conjunto</h3></div>
    <div class="form-grid-conjunto">
        <div class="form-group-dark conj-id">
            <label>ID Conjunto</label>
            <input type="number" id="conjuntoId" placeholder="Ex: 34">
        </div>
        <div class="cam-pair">
            <input type="text" id="caminhao1Placa" placeholder="Placa 1">
            <input type="text" id="caminhao1Go" placeholder="GO 1">
        </div>
        <div class="cam-pair">
            <input type="text" id="caminhao2Placa" placeholder="Placa 2">
            <input type="text" id="caminhao2Go" placeholder="GO 2">
        </div>
        <div class="form-actions conj-btn">
            <button id="btnAddConjunto" class="btn-primary-blue btn-full" onclick="adicionarConjunto()">✅ Criar</button>
        </div>
    </div>
</div>

<div class="content-panel">
    <div class="panel-header"><h3>🚛 Conjuntos e Caminhões</h3></div>
    <div id="conjuntosList" class="conjuntos-cards-grid"></div>
</div>
