<div class="recados-dashboard">
    <div class="recados-header-kanban">
        <div class="header-titulos">
            <h2>📝 Mural de Recados Kanban</h2>
            <p>Gerencie anotações arrastando os cards e controle o histórico.</p>
        </div>
        <div class="kanban-tabs">
            <button id="btn-tab-quadro" class="tab-btn active" onclick="alternarAbaRecados('quadro')">📋 Quadro Trello</button>
            <button id="btn-tab-historico" class="tab-btn" onclick="alternarAbaRecados('historico')">🕰️ Histórico</button>
        </div>
    </div>

    <div class="recados-form-top">
        <form id="form-recado">
            <div class="form-row">
                <input type="text" id="titulo-recado" class="dark-input" placeholder="Título da tarefa..." required>
                <input type="text" id="desc-recado" class="dark-input" placeholder="Detalhes rápidos..." required>
                <select id="prioridade-recado" class="dark-input" required>
                    <option value="alta">🔴 Alta Prioridade</option>
                    <option value="media" selected>🟡 Média Prioridade</option>
                    <option value="baixa">🔵 Baixa Prioridade</option>
                </select>
                <input type="datetime-local" id="data-recado" class="dark-input" required>
                <button type="submit" class="btn-primary-green">➕ Adicionar</button>
            </div>
        </form>
    </div>

    <div id="view-quadro" class="kanban-board">
        
        <div class="kanban-column">
            <div class="kanban-column-header header-alta">
                <span>🔴 Alta Prioridade</span>
                <span class="badge-contador" id="count-alta">0</span>
            </div>
            <div class="kanban-dropzone" id="lista-alta" ondrop="soltarRecado(event, 'alta')" ondragover="permitirSoltar(event)">
                </div>
        </div>

        <div class="kanban-column">
            <div class="kanban-column-header header-media">
                <span>🟡 Média Prioridade</span>
                <span class="badge-contador" id="count-media">0</span>
            </div>
            <div class="kanban-dropzone" id="lista-media" ondrop="soltarRecado(event, 'media')" ondragover="permitirSoltar(event)">
                </div>
        </div>

        <div class="kanban-column">
            <div class="kanban-column-header header-baixa">
                <span>🔵 Baixa Prioridade</span>
                <span class="badge-contador" id="count-baixa">0</span>
            </div>
            <div class="kanban-dropzone" id="lista-baixa" ondrop="soltarRecado(event, 'baixa')" ondragover="permitirSoltar(event)">
                </div>
        </div>

    </div>

    <div id="view-historico" class="historico-panel" style="display: none;">
        <div class="historico-header">
            <h3>Tarefas Concluídas</h3>
            <button class="btn-outline-red" onclick="limparHistoricoRecados()">🗑️ Limpar Histórico</button>
        </div>
        <div class="historico-grid" id="lista-historico">
            </div>
    </div>
</div>

<style>
    /* Estilos Modernos Dark Mode - Padrão CCOL Kanban */
    .recados-dashboard {
        padding: 20px;
        color: #f1f5f9;
        max-width: 1400px;
        margin: 0 auto;
        animation: fadeIn 0.3s ease-in-out;
    }

    .recados-header-kanban {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 15px;
    }

    .header-titulos h2 { margin: 0; color: #38bdf8; font-size: 1.6rem; }
    .header-titulos p { margin: 5px 0 0 0; color: #94a3b8; font-size: 0.95rem; }

    /* Abas */
    .kanban-tabs {
        display: flex;
        gap: 10px;
        background: rgba(15, 23, 42, 0.6);
        padding: 5px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tab-btn {
        background: transparent;
        border: none;
        color: #94a3b8;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
    }

    .tab-btn.active { background: #38bdf8; color: #0f172a; }
    .tab-btn:hover:not(.active) { color: #f8fafc; background: rgba(255,255,255,0.05); }

    /* Formulário no Topo */
    .recados-form-top {
        background: rgba(30, 41, 59, 0.8);

        border-radius: 8px;
        padding: 15px;
        margin-bottom: 25px;
    }

        display: flex;
        gap: 15px;
        align-items: center;
    }

    .form-row > * { flex: 1; }

    /* Inputs Padrão */
    .dark-input {
        padding: 10px;

        border: 1px solid rgba(255, 255, 255, 0.2);

    .kanban-column-header {

        border-radius: 12px;

    .kanban-dropzone {

    .btn-concluir-mini {
        background: transparent;
        color: #10b981;
        border: 1px solid #10b981;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-concluir-mini:hover { background: #10b981; color: #0f172a; }

    /* Estilos Histórico */
    .historico-panel { background: rgba(30, 41, 59, 0.4); border-radius: 8px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .historico-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .historico-header h3 { margin: 0; color: #10b981; }
    .historico-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }

    .btn-outline-red {
        background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 8px 15px;
        border-radius: 6px; cursor: pointer; transition: all 0.2s;
    }
    .btn-outline-red:hover { background: #ef4444; color: #fff; }

    /* Responsividade form top */
    @media (max-width: 1024px) {
        .form-row { flex-direction: column; }
        .form-row > * { width: 100%; }
    }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
